# ===============================
# APP
# ===============================
spring.application.name=sentinel

# ===============================
# DATASOURCE
# ===============================
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/sentinel_db}
spring.datasource.username=${DB_USERNAME:sentinel}
spring.datasource.password=${DB_PASSWORD}

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ===============================
# SERVER
# ===============================
server.port=${PORT:8080}

# ===============================
# GMAIL SMTP
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Prevent SMTP from hanging indefinitely
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# SENTINEL Admin Inbox
sentinel.admin.email=${ADMIN_EMAIL}